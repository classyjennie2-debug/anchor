<svg xmlns="http://www.w3.org/2000/svg" width="300" height="56" viewBox="0 0 300 56" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .logo-text { fill: #1a1a18; }
    }
    @media (prefers-color-scheme: dark) {
      .logo-text { fill: #ffffff; }
    }
  </style>
  
  <!-- Anchor Icon -->
  <g transform="translate(2, 4)">
    <!-- Ring/Eye -->
    <circle cx="24" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.8" class="logo-text"/>
    <!-- Chain/Rope -->
    <path class="logo-text" d="M24 17 L24 28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <!-- Anchor Flukes/Arms -->
    <path class="logo-text" d="M24 28 Q12 34 8 45 M24 28 Q36 34 40 45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <!-- Bottom fluke curve -->
    <path class="logo-text" d="M8 45 Q8 48 12 50 Q24 54 36 50 Q40 48 40 45" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Text: Anchor Capital -->
  <text x="60" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" letter-spacing="-0.3" class="logo-text">Anchor Capital</text>
</svg>